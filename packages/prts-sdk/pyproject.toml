[project]
name = "prts"
version = "0.1.0"
description = "PRTS SDK — 用户在 workspace/skills/*.py 里 from prts import ... 的脚本 API。仅本地 monorepo 包,不发 PyPI。"
requires-python = ">=3.12"
authors = [{ name = "zayoka" }]
license = { text = "MIT" }
# 故意保持 zero deps:prts-sdk 的所有"对外动作"都通过 prts.runtime.RuntimeBridge
# 走到 Agent,SDK 自己不需要任何第三方包。这样脚本环境最干净,IDE 类型也不会
# 被 LLM 客户端等大依赖拖慢。
dependencies = []

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/prts"]
